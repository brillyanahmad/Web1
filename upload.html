<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File ke Google Drive</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Card Container (Responsif) */
        .upload-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .upload-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #333333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p.subtitle {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Grouping untuk Form Input */
        .form-group {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #444444;
        }

        /* Styling Dropdown Kategori */
        .category-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            color: #333333;
            background-color: #f8faff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            appearance: none; /* Menghilangkan arrow bawaan browser untuk custom styling */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234a90e2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .category-select:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        /* Custom Dropzone / Upload Area */
        .file-drop-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 35px;
            border: 2px dashed #4a90e2;
            border-radius: 12px;
            background-color: #f8faff;
            cursor: pointer;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .file-drop-area:hover {
            background-color: #f0f4fe;
            border-color: #357abd;
        }

        /* Icon bayangan untuk mempercantik */
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #4a90e2;
        }

        /* Menyembunyikan input asli yang kaku */
        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-msg {
            font-size: 15px;
            color: #555555;
            font-weight: 500;
            word-break: break-all;
        }

        /* Tombol Submit */
        .submit-btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #357abd;
            box-shadow: 0 6px 16px rgba(53, 122, 189, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Media Queries untuk layar super kecil (HP Kuno/Kecil) */
        @media (max-width: 400px) {
            .upload-container {
                padding: 25px 15px;
            }
            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Upload File</h2>
        <p class="subtitle">Unggah file Anda langsung ke Google Drive</p>
        
        <form action="" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="kategori">Kategori Karya</label>
                <select name="kategori" id="kategori" class="category-select" required>
                    <option value="" disabled selected>-- Pilih Kategori Karya --</option>
                    <option value="artikel_tulisan">Artikel / Tulisan</option>
                    <option value="desain_grafis">Desain Grafis / Gambar</option>
                    <option value="audio_video">Audio / Video</option>
                    <option value="aplikasi_web">Aplikasi / Source Code</option>
                </select>
            </div>
            
            <div class="file-drop-area">
                <span class="upload-icon">📁</span>
                <span class="file-msg" id="file-text">Pilih file atau seret ke sini</span>
                <input class="file-input" type="file" name="file" id="file-chooser" required>
            </div>
            
            <button type="submit" class="submit-btn">Kirim File</button>
        </form>
    </div>

    <script>
        // Efek JavaScript sederhana untuk mengubah teks saat file berhasil dipilih
        const fileChooser = document.getElementById('file-chooser');
        const fileText = document.getElementById('file-text');

        fileChooser.addEventListener('change', function() {
            if (fileChooser.files.length > 0) {
                fileText.innerText = "File terpilih: " + fileChooser.files[0].name;
                fileText.style.color = "#2e7d32"; // Ubah teks jadi hijau tanda sukses terpilih
            } else {
                fileText.innerText = "Pilih file atau seret ke sini";
                fileText.style.color = "#555555";
            }
        });
    </script>

</body>
</html>
